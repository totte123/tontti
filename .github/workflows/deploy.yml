name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]    # tai master, jos käytät sitä

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_MML_API_KEY: ${{ secrets.VITE_MML_API_KEY }}   # ← jos avain on salaisuus

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
